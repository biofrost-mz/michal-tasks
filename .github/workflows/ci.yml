name: CI

on:
  push:
    branches:
      - main
      - "fix/**"
      - "feature/**"
      - "codex/**"
  pull_request:
    branches:
      - main

jobs:
  lint-test-build:
    name: Lint, test and build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build app
        run: npm run build

  deno-check:
    name: Deno type-check (edge functions)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Cache Deno dependencies
        run: |
          for dir in supabase/functions/*/; do
            if [ -f "${dir}index.ts" ]; then
              deno cache "${dir}index.ts"
            fi
          done

      - name: Type-check edge functions
        run: |
          FAILED=0
          for dir in supabase/functions/*/; do
            if [ -f "${dir}index.ts" ]; then
              echo "Checking ${dir}index.ts..."
              deno check "${dir}index.ts" || FAILED=1
            fi
          done
          exit $FAILED

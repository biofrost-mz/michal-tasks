name: CI

on:
  push:
    branches:
      - main
      - "fix/**"
      - "feature/**"
      - "codex/**"
  pull_request:
    branches:
      - main

jobs:
  lint-and-build:
    name: Lint and build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: |
          npm run lint || {
            echo "::warning::ESLint reported issues in legacy code. CI continues and the production build remains the blocking check."
          }

      - name: Build app
        run: npm run build
